name: Accessibility Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full_run:
        description: 'Force a full accessibility run'
        type: boolean
        default: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      force_full_run: ${{ github.event.inputs.force_full_run || 'false' }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            client:
              - 'client/**'
              - 'shared/**'
              - '.github/workflows/accessibility.yml'

  a11y-tests:
    name: Axe Accessibility Checks
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.force_full_run == 'true' || needs.changes.outputs.client == 'true' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Build client
        working-directory: client
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: http://localhost:3000
        run: npm run build

      - name: Run accessibility tests
        working-directory: client
        env:
          E2E_BASE_URL: http://localhost:3000
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 60000
          npm run test:a11y

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-report
          path: client/playwright-report/
          retention-days: 14
