name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Validate environment variables
  # Must pass before the build job starts.
  # ──────────────────────────────────────────────
  validate-env:
    name: Validate Environment Variables
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Validate client environment variables
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
        run: node client/scripts/validate-env.js

      - name: Validate backend environment variables
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PORT: ${{ secrets.PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SOROBAN_CONTRACT_ADDRESS: ${{ secrets.SOROBAN_CONTRACT_ADDRESS }}
          STELLAR_NETWORK_URL: ${{ secrets.STELLAR_NETWORK_URL }}
        run: node backend/scripts/validate-env.js

  # ──────────────────────────────────────────────
  # Job 2: Dependency vulnerability scan
  # Blocks PRs with High or Critical vulnerabilities.
  # ──────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: validate-env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Audit client dependencies
        working-directory: client
        run: npm audit --audit-level=high --omit=dev

      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --audit-level=high --omit=dev

  # ──────────────────────────────────────────────
  # Job 3: Build the client
  # Only runs if validate-env passes.
  # ──────────────────────────────────────────────
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: [validate-env, security-audit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
        run: npm run build

  # ──────────────────────────────────────────────
  # Job 4: SDK — install, build, test
  # Runs in parallel with build-client and test-backend.
  # Blocks merges on any SDK regression.
  # ──────────────────────────────────────────────
  test-sdk:
    name: SDK — Build & Test
    runs-on: ubuntu-latest
    needs: [validate-env, security-audit]

    defaults:
      run:
        working-directory: sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Matches sdk/.tool-versions (nodejs 23.4.0)
          node-version: "23.4.0"
          cache: "npm"
          cache-dependency-path: |
            sdk/package-lock.json
            sdk/package.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        # ESM Jest requires the experimental VM modules flag
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: npm test -- --ci --coverage

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: sdk-test-results
          path: |
            sdk/coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 3: Run backend tests
  # Only runs if validate-env passes.
  # ──────────────────────────────────────────────
  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    needs: [validate-env, security-audit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install client dependencies
        working-directory: client
        run: pnpm install --no-frozen-lockfile

      - name: Run client unit tests
        working-directory: client
        run: pnpm test

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: [validate-env, security-audit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PORT: ${{ secrets.PORT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SOROBAN_CONTRACT_ADDRESS: ${{ secrets.SOROBAN_CONTRACT_ADDRESS }}
          STELLAR_NETWORK_URL: ${{ secrets.STELLAR_NETWORK_URL }}
        run: npm test -- --coverage --ci
