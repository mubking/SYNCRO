name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full_run:
        description: 'Force a full test run'
        type: boolean
        default: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      client: ${{ steps.filter.outputs.client }}
      force_full_run: ${{ github.event.inputs.force_full_run || 'false' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'shared/**'
            client:
              - 'client/**'
              - 'shared/**'

  test-client:
    name: Test Client
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.force_full_run == 'true' || needs.changes.outputs.client == 'true' }}
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run client unit tests
        run: npm test

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: client-coverage-report
          path: client/coverage/

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.force_full_run == 'true' || needs.changes.outputs.backend == 'true' }}
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      JWT_SECRET: test-secret
      ADMIN_API_KEY: test-admin-key
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --ci

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
